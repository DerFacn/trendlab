<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendLab</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
        }

        .content {
            width: 100%;
            border-bottom: 2px solid black;
        }

        .header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding-left: 12px;
            padding-right: 12px;
        }

        .logo {
            font-size: 24px;
            margin: 16px;
        }

        .navbar {
            display: flex;
            flex-direction: row;
            margin: 16px;
            gap: 12px;
        }

        .navbar > a {
            text-decoration: none;
            color: black;
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="header">
            <div class="logo">TrendLab</div>
            <div class="navbar">
                <a href="#">Signup</a>
                <a href="#">Login</a>
            </div>
        </div>
    </div>
</body>
</html>
